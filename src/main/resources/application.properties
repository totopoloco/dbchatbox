spring.application.name=dbchatbox
spring.profiles.default=dev
spring.graphql.http.path=/graphql
spring.graphql.graphiql.enabled=true
spring.graphql.schema.printer.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# GDPR purge job
app.gdpr.purge-cron=0 0 2 * * *
app.gdpr.retention-days=30

# Payment document settings
app.payment.max-document-size-bytes=10485760
app.payment.storage-path=payment-documents
app.payment.grace-period-default-days=30

# Notification settings
app.notification.overdue-check-cron=0 0 8 * * *
app.notification.reminder-interval-days=7

# ----------------------------------------------------------------------
# Chatbox (natural-language assistant, Spring AI 2.0)
# ----------------------------------------------------------------------
# Spring AI chat-model selection. When swapping providers, also swap the
# starter in build.gradle AND the matching `spring.ai.<provider>.*` properties
# below. Exactly one chat-model starter should be on the classpath.
spring.ai.model.chat=anthropic

# Anthropic provider — API key is read from an environment variable so it
# never lands in git. See `.env.example` for the variable name. For local
# development, export it in your shell before running `./gradlew bootRun`.
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5-20251001
spring.ai.anthropic.chat.options.temperature=0.2
spring.ai.anthropic.chat.options.max-tokens=1024

# Application-level chatbox knobs. See ChatboxProperties.java.
app.chatbox.enabled=true
app.chatbox.model=claude-haiku-4-5-20251001
app.chatbox.rate-limit.requests-per-hour=30
