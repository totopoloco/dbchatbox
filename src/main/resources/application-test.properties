spring.datasource.url=jdbc:h2:mem:dbchatbox-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=false

# Phase 2 — provide a test-only HMAC pepper so the app starts in test mode.
# This value must never be used in production — set API_KEY_HMAC_SECRET in the environment instead.
app.security.api-key.hmac-secret=test-only-hmac-pepper-change-in-production
