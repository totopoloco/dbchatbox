# Starship prompt configuration
# Docs: https://starship.rs/config/

format = """
$username\
$hostname\
$time\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$cmd_duration\
$character"""

# Blank line between prompts for readability
add_newline = true

[username]
style_user = "bold green"
style_root = "bold red"
format = "[$user]($style)@"
show_always = true

[hostname]
ssh_only = false
# Truncate long hostnames (e.g. mavila-CELSIUS-H730 -> mavila-CELSIUS)
format = "[${hostname}](bold green) "
disabled = false

[time]
disabled = false
time_format = "%H:%M:%S"
format = "[$time](bold yellow):"

[directory]
style = "bold blue"
truncation_length = 5
truncate_to_repo = false
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "⎇  "
style = "bold purple"
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_commit]
commit_hash_length = 7
tag_symbol = " 🏷 "
tag_disabled = false
format = "[\\($hash$tag\\)]($style) "
style = "bold green"

[git_state]
format = "[\\($state( $progress_current/$progress_total)\\)]($style) "
style = "bold yellow"

[git_metrics]
added_style = "bold green"
deleted_style = "bold red"
only_nonzero_diffs = true
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"
disabled = false

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
up_to_date = "✓"
untracked = "?${count}"
stashed = "\\$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 2_000
format = "took [$duration](bold yellow) "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"
